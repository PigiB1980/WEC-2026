<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fase 5 - World Elimination Cup 2026</title>
<style>
body {
  font-family: "Segoe UI", Arial, sans-serif;
  background-color: #0b0c10;
  color: white;
  margin: 0;
  padding: 40px;
  text-align: center;
}

/* Pulsante Home */
.home-button {
  position: fixed;
  top: 20px;
  left: 20px;
  background-color: rgba(0,170,255,0.2);
  color: white;
  text-decoration: none;
  padding: 8px 16px;
  border-radius: 8px;
  font-weight: bold;
  transition: background 0.3s;
  z-index: 1000;
}
.home-button:hover { background-color: rgba(0,170,255,0.4); }

h1 { color: #00aaff; margin-bottom: 40px; }

table {
  width: 95%;
  margin: 30px auto;
  border-collapse: collapse;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  overflow: hidden;
}

th, td {
  padding: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

th { background-color: rgba(0,170,255,0.2); text-transform: uppercase; }
tr:hover { background-color: rgba(0,170,255,0.1); }

img.flag {
  width: 24px;
  height: auto;
  vertical-align: middle;
  margin-right: 6px;
}

.qualificata { font-weight: bold; color: #00ffcc; }

.video-link {
  font-size: 18px;
  text-decoration: none;
}
.video-link:hover { color: #00ffcc; }

  .video-sorteggio {
  margin: 30px auto 50px;
  max-width: 900px;
}

.video-sorteggio iframe {
  width: 100%;
  height: 500px;
  border-radius: 15px;
  border: none;
  box-shadow: 0 6px 20px rgba(0,0,0,0.5);
}

  .intro-video {
  margin: 30px auto 50px;
  max-width: 900px;
  text-align: center;
}

.intro-video p {
  font-size: 24px;
  color: #00aaff;
  font-weight: bold;
  margin-bottom: 15px;
}

.intro-video iframe {
  width: 100%;
  height: 500px;
  border-radius: 15px;
  border: none;
  box-shadow: 0 6px 20px rgba(0,0,0,0.5);
  
</style>
</head>
<body>

<a href="index.html" class="home-button">🏠 Home</a>
<h1>Fase 5 - World Elimination Cup 2026</h1>

  <div class="intro-video">
  <p>📽️ Sorteggio Fase 4 – World Elimination Cup 2026</p>
  <iframe
    src="https://www.youtube.com/embed/FAtZd2KaF50"
    title="Sorteggio Fase 4"
    allowfullscreen>
  </iframe>
</div>

<div id="tabella-eliminazione"></div>

<script>
// Inserisci qui i codici bandiera quando li conosci
const codiciBandiera = {
  "Svizzera": "ch",
  "Algeria": "dz",
  "Rep. Ceca": "cz",
  "Messico": "mx",
  "Danimarca": "dk",
  "Senegal": "sn",
  "Svezia": "se",
  "Nigeria": "ng",
  "Austria": "at",
  "Russia": "ru",
  "Cile": "cl",
  "Ucraina": "ua",

  // Qualificate dalla Fase 4
  "Israele": "il",
  "Perù": "pe",
  "Australia": "au",
  "U.S.A.": "us",
  "Paraguay": "py",
  "Venezuela": "ve",
  "Mali": "ml",
  "Slovenia": "si",
  "Albania": "al",
  "Tunisia": "tn",
  "Gabon": "ga",
  "Finlandia": "fi",
  "Corea del Sud": "kr",
  "Camerun": "cm",
  "Canada": "ca",
  "Egitto": "eg"
};

// JSON Fase 5
fetch('fase5.json')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('tabella-eliminazione');
    const table = document.createElement('table');
    table.innerHTML = `
      <thead>
        <tr>
          <th style="width:40px">#</th>
          <th>Squadra 1</th>
          <th>Squadra 2</th>
          <th style="width:60px">Andata</th>
          <th style="width:60px">Ritorno</th>
          <th style="width:100px">Qualificata</th>
          <th style="width:40px">📺</th>
        </tr>
      </thead>
    `;
    const tbody = document.createElement('tbody');

    data.partite.forEach(p => {
      tbody.innerHTML += `
        <tr>
          <td>${p.id}</td>
          <td><img class="flag" src="flags/${codiciBandiera[p.squadra1] || 'tbd'}.png" alt="${p.squadra1}"> ${p.squadra1}</td>
          <td><img class="flag" src="flags/${codiciBandiera[p.squadra2] || 'tbd'}.png" alt="${p.squadra2}"> ${p.squadra2}</td>
          <td>${p.andata || '-'}</td>
          <td>${p.ritorno || '-'}</td>
          <td class="qualificata">${p.qualificata || '-'}</td>
          <td><a class="video-link" href="fase5_videos.html#partita${p.id}" target="_blank">📺</a></td>
        </tr>
      `;
    });

    table.appendChild(tbody);
    container.appendChild(table);
  })
  .catch(err => console.warn('Errore nel caricamento del JSON della fase 5', err));
</script>

</body>
</html>
