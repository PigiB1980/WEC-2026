<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fase 5 - Video World Elimination Cup 2026</title>
<style>
body {
  font-family: "Segoe UI", Arial, sans-serif;
  background-color: #0b0c10;
  color: white;
  margin: 0;
  padding: 40px;
  text-align: center;
}

h1 { color: #00aaff; margin-bottom: 30px; }
h2 { color: #00ffcc; margin-top: 40px; margin-bottom: 20px; }

.home-button {
  position: fixed;
  top: 20px;
  left: 20px;
  background-color: rgba(0,170,255,0.2);
  color: white;
  text-decoration: none;
  padding: 8px 16px;
  border-radius: 8px;
  font-weight: bold;
  transition: background 0.3s;
  z-index: 1000;
}
.home-button:hover { background-color: rgba(0,170,255,0.4); }

.video-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  margin-bottom: 30px;
}

.video-row iframe {
  width: 300px;
  height: 170px;
  border: none;
  border-radius: 12px;
}

.video-container {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.video-container span {
  margin-top: 6px;
  font-size: 14px;
  text-align: center;
}
</style>
</head>
<body>

<a href="fase5.html" class="home-button">🏠 Torna alla Fase 5</a>
<h1>Fase 5 - Video World Elimination Cup 2026</h1>

<div id="video-container"></div>

<script>
const videoData = [
  {tipo: "Andata", partite:[
    {descr:"Tunisia - Egitto (andata)", url:"https://www.youtube.com/embed/noJwk4OIpcM"},
    {descr:"Australia - Finlandia (andata)", url:"https://www.youtube.com/embed/jAxAwdvgQ6E"},
    {descr:"Ucraina - Svizzera (andata)", url:"https://www.youtube.com/embed/XXXXX3"},
    {descr:"Cile - Gabon (andata)", url:"https://www.youtube.com/embed/XXXXX4"},
    {descr:"Canada - Paraguay (andata)", url:"https://www.youtube.com/embed/XXXXX5"},
    {descr:"Corea del Sud - Svezia (andata)", url:"https://www.youtube.com/embed/XXXXX6"},
    {descr:"Nigeria - Messico (andata)", url:"https://www.youtube.com/embed/XXXXX7"},
    {descr:"Russia - Camerun (andata)", url:"https://www.youtube.com/embed/XXXXX8"},
    {descr:"Mali - Albania (andata)", url:"https://www.youtube.com/embed/XXXXX9"},
    {descr:"Venezuela - Rep. Ceca (andata)", url:"https://www.youtube.com/embed/XXXXX10"},
    {descr:"Austria - Danimarca (andata)", url:"https://www.youtube.com/embed/XXXXX11"},
    {descr:"Slovenia - Perù (andata)", url:"https://www.youtube.com/embed/XXXXX12"},
    {descr:"U.S.A. - Israele (andata)", url:"https://www.youtube.com/embed/XXXXX13"},
    {descr:"Senegal - Algeria (andata)", url:"https://www.youtube.com/embed/XXXXX14"}
  ]},
  {tipo: "Ritorno", partite:[
    {descr:"Egitto - Tunisia (ritorno)", url:"https://www.youtube.com/embed/XXXXX15"},
    {descr:"Finlandia - Australia (ritorno)", url:"https://www.youtube.com/embed/XXXXX16"},
    {descr:"Svizzera - Ucraina (ritorno)", url:"https://www.youtube.com/embed/XXXXX17"},

    {descr:"Svezia - Corea del Sud (ritorno)", url:"https://www.youtube.com/embed/XXXXX20"},
    {descr:"Messico - Nigeria (ritorno)", url:"https://www.youtube.com/embed/XXXXX21"},
    {descr:"Camerun - Russia (ritorno)", url:"https://www.youtube.com/embed/XXXXX22"},
    {descr:"Albania - Mali (ritorno)", url:"https://www.youtube.com/embed/XXXXX23"},

    {descr:"Algeria - Senegal (ritorno)", url:"https://www.youtube.com/embed/XXXXX28"}
  ]}
];

const container = document.getElementById('video-container');

videoData.forEach(sezione => {
  const h2 = document.createElement('h2');
  h2.textContent = sezione.tipo;
  container.appendChild(h2);

  const videoRow = document.createElement('div');
  videoRow.className = 'video-row';

  sezione.partite.forEach(v => {
    const vc = document.createElement('div');
    vc.className = 'video-container';
    vc.innerHTML = `<iframe src="${v.url}" allowfullscreen title="${v.descr}"></iframe><span>${v.descr}</span>`;
    videoRow.appendChild(vc);
  });

  container.appendChild(videoRow);
});
</script>

</body>
</html>
